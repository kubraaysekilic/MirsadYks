<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Mirsad Aktaş - Sınav Hazırlık</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --pudra-pink: #fce4ec;
            --soft-purple: #f3e5f5;
            --fairy-green: #e8f5e9;
            --deep-purple: #7b1fa2;
            --accent-pink: #ff80ab;
            --white-glass: rgba(255, 255, 255, 0.9);
        }

        /* Arka Plan ve Genel Yapı */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: url('m.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .overlay {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.2s ease-out;
        }

        /* Animasyonlar */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--white-glass);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 4px solid var(--pudra-pink);
            position: relative;
            margin-top: 20px;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--deep-purple);
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: float 4s ease-in-out infinite;
        }

        /* Navigasyon Sekmeleri */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--soft-purple);
            color: var(--deep-purple);
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: var(--accent-pink);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .tab-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tab-btn.active {
            background: var(--accent-pink);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 128, 171, 0.4);
            transform: scale(1.05);
        }

        .tab-btn.active::after {
            width: 100%;
        }

        /* Soru Kartı */
        .question-card {
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--pudra-pink);
            box-shadow: inset 0 0 15px rgba(252, 228, 236, 0.5);
            transition: all 0.5s ease;
        }

        .question-card.fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        .question-meta {
            color: var(--accent-pink);
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #444;
            margin-bottom: 30px;
        }

        /* Seçenekler */
        .options {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: var(--fairy-green);
            border: 2px solid transparent;
            padding: 18px;
            border-radius: 20px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1rem;
            color: #2e7d32;
            position: relative;
        }

        .option-btn:hover {
            background: #c8e6c9;
            transform: translateX(10px);
            box-shadow: -5px 5px 15px rgba(0,0,0,0.05);
        }

        .option-btn.selected {
            border-color: var(--accent-pink);
            background: #fce4ec;
            color: var(--deep-purple);
            transform: scale(1.02) translateX(10px);
            box-shadow: 0 5px 15px rgba(255, 128, 171, 0.2);
        }

        /* Butonlar */
        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-solve { background: var(--deep-purple); color: white; }
        .btn-review { background: var(--pudra-pink); color: var(--deep-purple); }
        .btn-confirm { background: #4caf50; color: white; }
        .btn-proof { background: #ff5722; color: white; display: none; }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Geri Bildirim */
        .feedback {
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            display: none;
            line-height: 1.7;
            font-size: 1.1rem;
            transform-origin: top;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from { transform: scaleY(0); opacity: 0; }
            to { transform: scaleY(1); opacity: 1; }
        }

        .feedback.correct { background: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2); }
        .feedback.wrong { background: #ffebee; border: 2px solid #ef5350; color: #c62828; box-shadow: 0 5px 15px rgba(239, 83, 80, 0.2); }

        /* Sayfalama */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            width: 100%;
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }

        .page-info { 
            color: var(--deep-purple); 
            font-weight: 600; 
            background: white;
            padding: 10px 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        #analysis-capture {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 600px;
            background: white;
            padding: 40px;
            border: 10px solid var(--pudra-pink);
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
        }

        .analysis-header {
            text-align: center;
            color: var(--deep-purple);
            border-bottom: 2px solid var(--pudra-pink);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .analysis-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            .container { padding: 25px; border-radius: 30px; }
            h1 { font-size: 2rem; }
            .btn { padding: 12px 25px; font-size: 1rem; }
            .question-text { font-size: 1.1rem; }
            .pagination { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <h1>🌿 Yusuf Mirsad'ın YKS Hazırlık sitesi 🌿</h1>
            
            <div class="nav-tabs">
                <button class="tab-btn active" id="tab-all" onclick="filterType('all')">Hepsi</button>
                <button class="tab-btn" id="tab-paragraf" onclick="filterType('paragraf')">Paragraf</button>
                <button class="tab-btn" id="tab-matematik" onclick="filterType('matematik')">Matematik</button>
            </div>

            <div id="quiz-area"></div>
        </div>

        <div class="pagination">
            <button class="btn btn-review" id="prevBtn" onclick="changeQuestion(-1)">✨ Önceki</button>
            <span class="page-info" id="pageInfo"></span>
            <button class="btn btn-review" id="nextBtn" onclick="changeQuestion(1)">Sonraki ✨</button>
        </div>
    </div>

    <div id="analysis-capture">
        <div class="analysis-header">
            <h2>Çalışma Analiz Raporu</h2>
            <p id="analysis-date"></p>
        </div>
        <div id="analysis-content"></div>
        <div style="margin-top: 30px; text-align: center; color: #888;">
            <p>Yusuf Mirsad Aktaş - Başarılar Dilerim 🦋</p>
        </div>
    </div>

    <script>
        const allQuestions = [
    {
        "id": 1,
        "type": "Paragraf",
        "text": "1. Benim metinlerimde ev başta olmak üzere mekân duygusu çok önem taşır, yazdığım karakterlerin nerede ve hangi şartlarda yaşadığını daha en baştan bilmem gerekir çünkü çevre, insanın karakterini biçimleme gücüne sahiptir. Özellikle büyük ölçekli yerleşimler, metropoller olumlu ya da olumsuz açıdan büyüleyicidir. Bu tür şehirlerden nefret ederiz veya onlara taparız. Kent olanaklarını sunuyorsa sevgi, sunmuyorsa nefret doğuyor insanda. Aslında ikisi de yanlış çünkü kent denen yerleşim yeri sunidir. Doğal şekilde oluşmamıştır ve insanın doğasına aykırı binlerce ayrıntıya sahiptir. Oysa köyler ve kasabalar zamanla oluşan ve doğal biçimde büyüyen yerler. Buralar insanın doğasıyla da sağlıklı bir ilişkiye sahip. Edebiyat - mekân bu açılardan değer taşır.<br><br><b>Bu parçanın konusu aşağıdakilerden hangisidir?</b>",
        "options": ["Kent yaşamının zorlukları", "Metropollerin çekiciliği", "Edebî metinlerde mekânın önemi", "Yaşanılan yerin karakter üzerindeki etkisi", "Küçük yerleşim birimlerinin olumlu yönleri"],
        "answer": 2,
        "explanation": "Cevap C şıkkıdır. Metinde yazarın mekân duygusuna verdiği önem ve mekânın edebiyat/insan üzerindeki etkileri anlatılmaktadır. Ana vurgu edebî metinlerde mekânın önemidir."
    },
    {
        "id": 2,
        "type": "Paragraf",
        "text": "2. Evvela tatlı bir hüzünle konuştuğumuz olur; sonra bolluk, bereket, hasat ayıdır. Ayva sarı, nar kırmızı, armut sulu, üzüm kehribardır. Kavunlar ve incirler iyice ballanmıştır. İpliğe dizilen alışlar sarı kızıl rengiyle kolları, göğüsleri sarmalamaktadır. Lakin bu dağ yemişi alev alev rengiyle o güzel zamanın bitmekte olduğunun da habercisidir. Bir de hikâyeler, kitaplar getirir, bir senenin serencamını. Bir yıldır biriken maceraların, öykülerin anlatılma vaktidir. Havalar azıcık soğumuş, yazdan yabandan, dağdan bayırdan, bağdan bostandan, tatilden, denizden kumdan evine dönen ve köşesine çekilen insanlar için biriktirilmiş hikâyelerin okunma vakti gelmiştir.<br><br><b>Bu parçanın konusu aşağıdakilerden hangisidir?</b>",
        "options": ["Sonbahar mevsimi", "Doğanın güzel yönleri", "Yaşamdan duyulan sevinç", "Meyvelerin özellikleri", "İnsan doğa ilişkisi"],
        "answer": 0,
        "explanation": "Cevap A şıkkıdır. Metinde sonbaharın gelişi, meyvelerin olgunlaşması ve bu dönemin hikâye okuma zamanı olduğu vurgulanmaktadır."
    },
    {
        "id": 3,
        "type": "Paragraf",
        "text": "3. Konuşmalarda belki de en önemli noktalardan biri, görünüştür. Görünüşünüzün nasıl olması gerektiğiyle ilgili kaygılarınız varsa önce şu iki soruya odaklanın: 'Görünüşüm iletmek istediğim mesaja uygun mu?' ve 'Kıyafetlerim içinde kendimi rahat hissediyor muyum?'. Mesela dinleyicilerinize 'Sizin gibi biriyim.' mesajını vermek istiyorsanız onlar gibi giyinmelisiniz. Şık bir restorandaki iş yemeğindeyseniz ona uygun bir kıyafet seçmelisiniz. Konuşmacının kıyafeti; yaşına, bedenine ve mevsime uygun olmalıdır. Ayrıca kıyafetin temiz ve ütülü olması, konuşmacının dinleyicilerine duyduğu saygının da bir göstergesidir.<br><br><b>Bu parçada aşağıdakilerin hangisinden söz edilmektedir?</b>",
        "options": ["Konuşmacının giyim kuşamının öneminden", "Görünüşün öz güven üzerindeki etkisinden", "Dinleyici kitlesinin beklentilerinden", "Konuşma ortamının özelliklerinden", "Kıyafet seçiminde dikkat edileceklerden"],
        "answer": 0,
        "explanation": "Cevap A şıkkıdır. Parçada konuşmacının görünüşünün ve kıyafetinin iletmek istediği mesajla uyumlu olması gerektiği üzerinde durulmaktadır."
    },
    {
        "id": 4,
        "type": "Paragraf",
        "text": "4. Kitaplar, insanlığın ortak mirasıdır ve her biri farklı bir dünyanın kapısını aralar. Okumak, sadece bilgi edinmek değil, aynı zamanda empati kurma yeteneğini geliştirmektir. Bir romanın sayfaları arasında kaybolurken, hiç tanımadığımız insanların acılarını, sevinçlerini ve hayallerini paylaşırız. Bu süreç, bireyin iç dünyasını zenginleştirir ve olaylara farklı açılardan bakmasını sağlar. Dolayısıyla kitap okuma alışkanlığı, toplumsal huzurun ve anlayışın temel taşlarından biridir.<br><br><b>Bu parçada kitap okumanın hangi yönü vurgulanmaktadır?</b>",
        "options": ["Bilgi düzeyini artırması", "Hayal gücünü geliştirmesi", "Bireysel ve toplumsal katkıları", "Zamanı verimli kullanma yolu olması", "Dil becerilerini iyileştirmesi"],
        "answer": 2,
        "explanation": "Cevap C şıkkıdır. Metinde kitap okumanın hem bireyin iç dünyasını zenginleştirdiği (bireysel) hem de toplumsal huzura katkı sağladığı (toplumsal) belirtilmektedir."
    },
    {
        "id": 5,
        "type": "Matematik",
        "text": "5. Bir sayının 3 katının 5 fazlası, aynı sayının 4 katının 2 eksiğine eşittir.<br><br><b>Buna göre bu sayı kaçtır?</b>",
        "options": ["5", "6", "7", "8", "9"],
        "answer": 2,
        "explanation": "Cevap 7'dir. Denklem: 3x + 5 = 4x - 2. Buradan x = 7 bulunur."
    },
    {
        "id": 6,
        "type": "Matematik",
        "text": "6. Bir sınıftaki öğrencilerin %60'ı erkektir. Sınıfta 12 kız öğrenci olduğuna göre, sınıf mevcudu kaçtır?</b>",
        "options": ["20", "25", "30", "35", "40"],
        "answer": 2,
        "explanation": "Cevap 30'dur. %40'ı kız ise, 0.40 * x = 12 denkleminden x = 30 bulunur."
    },
    {
        "id": 7,
        "type": "Matematik",
        "text": "7. Hangi sayının 2 katının 10 fazlası, kendisinin 3 katına eşittir?</b>",
        "options": ["5", "10", "15", "20", "25"],
        "answer": 1,
        "explanation": "Cevap 10'dur. 2x + 10 = 3x denkleminden x = 10 bulunur."
    },
    {
        "id": 8,
        "type": "Matematik",
        "text": "8. Bir dikdörtgenin uzun kenarı kısa kenarının 2 katıdır. Çevresi 30 cm olduğuna göre, uzun kenarı kaç cm'dir?</b>",
        "options": ["5", "10", "15", "20", "25"],
        "answer": 1,
        "explanation": "Cevap 10'dur. Kısa kenar x, uzun kenar 2x olsun. 2(x + 2x) = 30 => 6x = 30 => x = 5. Uzun kenar 2x = 10 olur."
    }
];

        let currentFilter = 'all';
        let currentIndex = 0;
        let userAnswers = {};
        let filteredQuestions = [];

        function filterType(type) {
            currentFilter = type;
            currentIndex = 0;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');

            filteredQuestions = type === 'all' 
                ? allQuestions 
                : allQuestions.filter(q => q.type.toLowerCase() === type);
            
            renderQuestion();
        }

        function renderQuestion() {
            const quizArea = document.getElementById('quiz-area');
            const q = filteredQuestions[currentIndex];
            
            if (!q) {
                quizArea.innerHTML = "<h2>Soru bulunamadı.</h2>";
                return;
            }

            const isSolved = userAnswers[q.id] !== undefined;

            quizArea.innerHTML = `
                <div class="question-card fade-in">
                    <div class="question-meta">
                        <span>📍 ${q.type}</span>
                        <span>•</span>
                        <span>Soru ${currentIndex + 1}</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <button class="option-btn ${userAnswers[q.id] === i ? 'selected' : ''}" 
                                    onclick="selectOption(${i})"
                                    ${isSolved ? 'disabled' : ''}>
                                ${String.fromCharCode(65 + i)}) ${opt}
                            </button>
                        `).join('')}
                    </div>
                    
                    <div class="actions">
                        ${!isSolved ? `
                            <button class="btn btn-solve" onclick="checkAnswer()">Cevabı Onayla</button>
                        ` : `
                            <button class="btn btn-review" onclick="toggleExplanation()">Çözümü Göster/Gizle</button>
                        `}
                        <button class="btn btn-confirm" id="finish-btn" onclick="finishQuiz()">Çalışmayı Bitir</button>
                        <button class="btn btn-proof" id="proof-btn" onclick="generateProof()">Kanıt Oluştur 📸</button>
                    </div>

                    <div id="feedback" class="feedback"></div>
                </div>
            `;

            updatePagination();
            if (isSolved) {
                showFeedback(userAnswers[q.id] === q.answer, q.explanation, false);
            }
        }

        function selectOption(index) {
            if (userAnswers[filteredQuestions[currentIndex].id] !== undefined) return;
            
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.classList.remove('selected'));
            btns[index].classList.add('selected');
            
            // Küçük bir seçim efekti
            btns[index].style.transform = 'scale(1.05) translateX(15px)';
            setTimeout(() => {
                btns[index].style.transform = 'scale(1.02) translateX(10px)';
            }, 200);

            userAnswers[filteredQuestions[currentIndex].id] = index;
        }

        function checkAnswer() {
            const q = filteredQuestions[currentIndex];
            const selected = userAnswers[q.id];
            
            if (selected === undefined) {
                alert("Lütfen bir seçenek belirleyin!");
                return;
            }

            const isCorrect = selected === q.answer;
            showFeedback(isCorrect, q.explanation, true);
            renderQuestion();
        }

        function showFeedback(isCorrect, text, animate) {
            const fb = document.getElementById('feedback');
            if (!fb) return;
            
            fb.style.display = 'block';
            fb.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            fb.innerHTML = `
                <strong>${isCorrect ? '✨ Tebrikler! Doğru.' : '😔 Maalesef yanlış.'}</strong><br>
                ${text}
            `;

            if (animate) {
                fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function toggleExplanation() {
            const fb = document.getElementById('feedback');
            fb.style.display = fb.style.display === 'none' ? 'block' : 'none';
        }

        function changeQuestion(step) {
            const newIndex = currentIndex + step;
            if (newIndex >= 0 && newIndex < filteredQuestions.length) {
                // Geçiş animasyonu için kartı önce hafifçe karartalım
                const card = document.querySelector('.question-card');
                card.style.opacity = '0';
                card.style.transform = step > 0 ? 'translateX(20px)' : 'translateX(-20px)';
                
                setTimeout(() => {
                    currentIndex = newIndex;
                    renderQuestion();
                }, 200);
            }
        }

        function updatePagination() {
            document.getElementById('pageInfo').innerText = `${currentIndex + 1} / ${filteredQuestions.length}`;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === filteredQuestions.length - 1;
            
            // Buton opaklıkları
            document.getElementById('prevBtn').style.opacity = currentIndex === 0 ? '0.5' : '1';
            document.getElementById('nextBtn').style.opacity = currentIndex === filteredQuestions.length - 1 ? '0.5' : '1';
        }

        function finishQuiz() {
            const answered = Object.keys(userAnswers).length;
            if (answered < filteredQuestions.length) {
                if (!confirm(`Henüz ${filteredQuestions.length} sorudan sadece ${answered} tanesini çözdün. Bitirmek istediğine emin misin?`)) return;
            }
            document.getElementById('proof-btn').style.display = 'inline-block';
            document.getElementById('finish-btn').style.display = 'none';
            alert("Çalışma tamamlandı! 'Kanıt Oluştur' butonu ile raporunu alabilirsin.");
        }

        async function generateProof() {
            const analysisDiv = document.getElementById('analysis-capture');
            const contentDiv = document.getElementById('analysis-content');
            const dateSpan = document.getElementById('analysis-date');
            
            dateSpan.innerText = new Date().toLocaleString('tr-TR');
            
            let correct = 0, wrong = 0;
            let total = allQuestions.length;
            let answered = Object.keys(userAnswers).length;

            Object.keys(userAnswers).forEach(id => {
                const q = allQuestions.find(x => x.id == id);
                if (userAnswers[id] === q.answer) correct++;
                else wrong++;
            });

            contentDiv.innerHTML = `
                <div class="analysis-stat"><span>Toplam Soru:</span> <b>${total}</b></div>
                <div class="analysis-stat" style="color:#2e7d32"><span>Doğru:</span> <b>${correct}</b></div>
                <div class="analysis-stat" style="color:#c62828"><span>Yanlış:</span> <b>${wrong}</b></div>
                <div class="analysis-stat" style="color:#666"><span>Boş:</span> <b>${total - answered}</b></div>
                <div class="analysis-stat" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px">
                    <span>Başarı Oranı:</span> <b>%${Math.round((correct / total) * 100)}</b>
                </div>
            `;

            try {
                const canvas = await html2canvas(analysisDiv);
                const link = document.createElement('a');
                link.download = `Yusuf_Mirsad_Analiz.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
                setTimeout(() => alert("Lütfen kanıtınızı ayşe abla adlı kişiye gönderiniz"), 500);
            } catch (err) {
                alert("Görsel oluşturulamadı.");
            }
        }

        filterType('all');
    </script>
</body>
</html>
