        // 17-32 arası örnek soruları ekle
        for(let i=17; i<=32; i++) {
            allQuestions.push({
                "id": i,
                "type": "Paragraf",
                "text": `${i}. (Örnek TYT Paragraf Sorusu) Edebiyat, insanın varoluşsal sancılarını dindirme çabasının en estetik dışavurumudur. Yüzyıllar boyunca yazarlar, kelimelerin sihirli dünyasında hem kendilerini hem de okurlarını iyileştirmeyi amaçlamışlardır. Bir romanın sayfaları arasında kaybolan okur, aslında kendi iç dünyasında bir yolculuğa çıkar.<br><br><b>Bu parçada asıl anlatılmak istenen aşağıdakilerden hangisidir?</b>`,
                "options": ["Edebiyatın iyileştirici gücü", "Yazarların yaşam öyküleri", "Roman okuma teknikleri", "Kelime seçiminin önemi", "Okur ve yazar arasındaki mesafe"],
                "answer": 0,
                "explanation": "Cevap A şıkkıdır. Metinde edebiyatın ve okumanın insanın iç dünyasındaki iyileştirici etkisi vurgulanmaktadır."
            });
        }

        let currentQuestions = [...allQuestions];
        let currentIndex = 0;
        let selectedOption = null;
        let userAnswers = {};

        function filterType(type) {
            const quizArea = document.getElementById('quiz-area');
            const pagination = document.querySelector('.pagination');
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');

            if (type === 'matematik') {
                quizArea.innerHTML = '<div class="question-card" style="text-align:center; padding: 50px;"><h2>Çok yakında... 🚀</h2><p>Matematik soruları yakında eklenecektir.</p></div>';
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            currentQuestions = type === 'all' ? [...allQuestions] : allQuestions.filter(q => q.type.toLowerCase() === type);
            currentIndex = 0;
            
            if (currentQuestions.length > 0) {
                loadQuestion();
            } else {
                quizArea.innerHTML = '<div class="question-card" style="text-align:center; padding: 50px;"><h2>Soru bulunamadı 🌸</h2></div>';
            }
        }

        function loadQuestion() {
            const q = currentQuestions[currentIndex];
            selectedOption = userAnswers[q.id] !== undefined ? userAnswers[q.id] : null;
            
            const quizArea = document.getElementById('quiz-area');
            quizArea.innerHTML = `
                <div class="question-card">
                    <div class="question-meta">🌸 ${q.type} - Soru #${q.id}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <button class="option-btn ${selectedOption === i ? 'selected' : ''}" id="opt-${i}" onclick="selectOpt(${i})"><b>${String.fromCharCode(65 + i)}</b> - ${opt}</button>
                        `).join('')}
                    </div>
                    <div class="actions" id="action-buttons">
                        ${userAnswers[q.id] !== undefined ? `
                            <button class="btn btn-review" onclick="review()">Tekrar İncele 🦋</button>
                            <button class="btn btn-solve" onclick="solve()">Çözdüm 🌿</button>
                        ` : `
                            <button class="btn btn-confirm" id="btn-confirm" onclick="confirmSelection()">Onayla ✔️</button>
                        `}
                        <button class="btn btn-proof" id="btn-proof" onclick="generateProof()" style="background:#ff5722; color:white; display:none;">Kanıt Çıkar 📸</button>
                    </div>
                    <div id="feedback" class="feedback"></div>
                </div>
            `;
            
            if (userAnswers[q.id] !== undefined) {
                document.querySelectorAll('.option-btn').forEach(b => {
                    b.onclick = null;
                    b.style.cursor = 'default';
                });
            }

            document.getElementById('pageInfo').innerText = `Soru ${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('prevBtn').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
            document.getElementById('nextBtn').style.visibility = currentIndex === currentQuestions.length - 1 ? 'hidden' : 'visible';
            
            checkProofButton();
        }

        function selectOpt(i) {
            selectedOption = i;
            document.querySelectorAll('.option-btn').forEach((b, idx) => {
                b.classList.toggle('selected', idx === i);
            });
        }

        function confirmSelection() {
            if (selectedOption === null) {
                alert("Lütfen bir şık seç little lady ✨");
                return;
            }
            
            const q = currentQuestions[currentIndex];
            userAnswers[q.id] = selectedOption;

            const actionButtons = document.getElementById('action-buttons');
            actionButtons.innerHTML = `
                <button class="btn btn-review" onclick="review()">Tekrar İncele 🦋</button>
                <button class="btn btn-solve" onclick="solve()">Çözdüm 🌿</button>
                <button class="btn btn-proof" id="btn-proof" onclick="generateProof()" style="background:#ff5722; color:white; display:none;">Kanıt Çıkar 📸</button>
            `;
            
            document.querySelectorAll('.option-btn').forEach(b => {
                b.onclick = null;
                b.style.cursor = 'default';
            });

            checkProofButton();
        }

        function review() {
            alert("Sakin ol Mirsad, her şeyi başarabilirsin 🦋");
        }

        function solve() {
            const q = currentQuestions[currentIndex];
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            
            if (selectedOption === q.answer) {
                feedback.className = 'feedback correct';
                feedback.innerHTML = `<b>Harikasın Doğru Cevap ✨</b><br><p>${q.explanation}</p>`;
            } else {
                feedback.className = 'feedback wrong';
                feedback.innerHTML = `<b>Canın sağ olsun, bir dahaki sefere 🌸</b><br>Doğru Şık: ${String.fromCharCode(65 + q.answer)}<br><p>${q.explanation}</p>`;
            }
        }

        function changeQuestion(dir) {
            currentIndex += dir;
            loadQuestion();
        }

        function checkProofButton() {
            const isLast = currentIndex === currentQuestions.length - 1;
            const isAnswered = userAnswers[currentQuestions[currentIndex].id] !== undefined;
            const proofBtn = document.getElementById('btn-proof');
            if (proofBtn) {
                proofBtn.style.display = (isLast && isAnswered) ? 'inline-block' : 'none';
            }
        }

        async function generateProof() {
            const analysisDiv = document.getElementById('analysis-capture');
            const contentDiv = document.getElementById('analysis-content');
            const dateSpan = document.getElementById('analysis-date');
            
            dateSpan.innerText = new Date().toLocaleString('tr-TR');
            
            let correct = 0, wrong = 0;
            let total = allQuestions.length;
            let answered = Object.keys(userAnswers).length;

            Object.keys(userAnswers).forEach(id => {
                const q = allQuestions.find(x => x.id == id);
                if (userAnswers[id] === q.answer) correct++;
                else wrong++;
            });

            contentDiv.innerHTML = `
                <div class="analysis-stat"><span>Toplam Soru:</span> <b>${total}</b></div>
                <div class="analysis-stat" style="color:#2e7d32"><span>Doğru:</span> <b>${correct}</b></div>
                <div class="analysis-stat" style="color:#c62828"><span>Yanlış:</span> <b>${wrong}</b></div>
                <div class="analysis-stat" style="color:#666"><span>Boş:</span> <b>${total - answered}</b></div>
                <div class="analysis-stat" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px">
                    <span>Başarı Oranı:</span> <b>%${Math.round((correct / total) * 100)}</b>
                </div>
            `;

            try {
                const canvas = await html2canvas(analysisDiv);
                const link = document.createElement('a');
                link.download = `Yusuf_Mirsad_Analiz.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
                setTimeout(() => alert("Lütfen kanıtınızı ayşe abla adlı kişiye gönderiniz 🦋"), 500);
            } catch (err) {
                alert("Görsel oluşturulamadı.");
            }
        }

        filterType('all');
    </script>
